#!/usr/bin/env bash
# ============================================================================
# DiagMaster 核心配置文件 - 统一管理所有诊断阈值与认证参数
# ============================================================================

# 【性能告警阈值】 - 可根据生产环境实际情况调整
CPU_WARN_THRESHOLD=80              # CPU 占用率告警阈值 (%)
MEM_WARN_THRESHOLD=85              # 内存占用率告警阈值 (%)
DISK_WARN_THRESHOLD=90             # 磁盘占用率告警阈值 (%)

# 【日志分析策略】
SSH_FAIL_CRITICAL=30               # SSH 失败次数达到此值视为严重安全威胁
OOM_KILL_ALERT_EN=true             # 是否启用 OOM-Killer 检测告警

# 【认证配置】
ADMIN_USER="admin"                 # 管理员账户名
# 12345 的 SHA256 哈希值 (echo -n "12345" | sha256sum)
ADMIN_PASS_HASH="5994471abb01112afcc18159f6cc74b4f511b99806da59b3caf5a9c173cacfc5"

# 【守护进程配置】
DAEMON_CHECK_INTERVAL=3             # 守护进程检查间隔 (秒)
DIAG_REPORT_ARCHIVE_DAYS=30         # 诊断报告保留天数

# 【日志路径】
KERN_LOG_PATH="/var/log/kern.log"  # 内核日志路径
AUTH_LOG_PATH="/var/log/auth.log"  # 认证日志路径
